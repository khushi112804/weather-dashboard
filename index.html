<!DOCTYPE html>
<html>
<head>
  <title>Smart City Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <aside class="sidebar">
    <h2>CityDash</h2>
    <input id="city" placeholder="Search city">
    <button onclick="searchCity()">Search</button>
  </aside>
   <h4>Favorites</h4>
<div id="favorites"></div>
  <main class="main">

    <div class="header">
      <h2 id="cityTitle">Search a city</h2>
      <button onclick="toggleTheme()">🌙</button>
      <button onclick="saveCity()">⭐</button>
    </div>

    <div class="card">
      <h3>Weather</h3>
      <p id="weather">--</p>
      <p id="weather">Loading...</p>
    </div>

    <div class="card" id="aqiCard">
      <h3>Air Quality</h3>
      <p id="aqiValue">--</p>
      <p id="aqiStatus"></p>
    </div>
    <div class="card">
<h3>Location</h3>
<iframe id="map"
width="100%"
height="250"
style="border:0"
loading="lazy">
</iframe>
</div>

  </main>

</div>

<script src="script.js"></script>
</body>
</html>
